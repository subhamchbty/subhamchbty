<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 410" width="760" height="410" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" role="img" aria-label="Subham Chakraborty — backend engineer, distributed systems in Go">
  <defs>
    <style>
      .l { opacity: 0; transform: translateY(6px); animation: rise .45s cubic-bezier(.2,.7,.3,1) forwards; }
      @keyframes rise { to { opacity: 1; transform: translateY(0); } }

      .cmd { clip-path: inset(0 100% 0 0); animation: type .6s steps(8) forwards; }
      @keyframes type { to { clip-path: inset(0 0 0 0); } }

      .caret { opacity: 0; animation: show .01s .58s forwards, blink 1s .58s step-end infinite; }
      .prompt { opacity: 0; animation: show .01s 2.7s forwards, blink 1s 2.7s step-end infinite; }
      @keyframes show { to { opacity: 1; } }
      @keyframes blink { 50% { opacity: 0; } }

      .d1 { animation-delay: .75s; }
      .d2 { animation-delay: 1.00s; }
      .d3 { animation-delay: 1.30s; }
      .d4 { animation-delay: 1.55s; }
      .d5 { animation-delay: 1.90s; }
      .d6 { animation-delay: 2.15s; }
      .d7 { animation-delay: 2.40s; }

      text { font-size: 16.5px; }
      .dim   { fill: #6e7681; }
      .txt   { fill: #c9d1d9; }
      .green { fill: #3fb950; }
      .cyan  { fill: #56d4dd; }
      .go    { fill: #00ADD8; }
      .name  { fill: #e6edf3; font-size: 27px; font-weight: 700; letter-spacing: .5px; }
      .field { fill: #56d4dd; font-weight: 700; }
    </style>
  </defs>

  <!-- window -->
  <rect x="1" y="1" width="758" height="408" rx="12" fill="#0d1117" stroke="#30363d"/>
  <rect x="1" y="1" width="758" height="41" rx="12" fill="#161b22"/>
  <rect x="1" y="30" width="758" height="12" fill="#161b22"/>
  <line x1="1" y1="42" x2="759" y2="42" stroke="#30363d"/>
  <circle cx="26" cy="21" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="21" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="21" r="6" fill="#27c93f"/>
  <text x="380" y="26" text-anchor="middle" class="dim" font-size="14">subham@dev: ~</text>

  <!-- command (typewriter) -->
  <g class="cmd">
    <text x="28" y="82"><tspan class="green">$</tspan><tspan class="txt" dx="8">whoami</tspan></text>
  </g>
  <rect class="caret" x="112" y="68" width="9" height="18" fill="#3fb950"/>

  <!-- name + role -->
  <g class="l d1"><text x="28" y="128" class="name">Subham Chakraborty</text></g>
  <g class="l d2">
    <text x="28" y="156">
      <tspan class="dim">backend engineer</tspan>
      <tspan class="dim" dx="8">·</tspan>
      <tspan class="dim" dx="8">distributed systems</tspan>
      <tspan class="dim" dx="8">·</tspan>
      <tspan class="go" dx="8" font-weight="700">go</tspan>
    </text>
  </g>

  <!-- personal statement -->
  <rect class="l d3" x="28" y="186" width="3" height="52" rx="1.5" fill="#56d4dd"/>
  <g class="l d3"><text x="46" y="206" class="txt">I build reliable, event-driven systems in Go — and I enjoy</text></g>
  <g class="l d4"><text x="46" y="230" class="txt">the unglamorous parts most: queues, locks, retries.</text></g>

  <!-- fields -->
  <g class="l d5">
    <text x="28" y="276"><tspan class="dim">~</tspan><tspan class="field" dx="8">currently</tspan></text>
    <text x="180" y="276" class="txt">going deeper on Go &amp; event-driven architecture</text>
  </g>
  <g class="l d6">
    <text x="28" y="306"><tspan class="dim">~</tspan><tspan class="field" dx="8">stack</tspan></text>
    <text x="180" y="306" class="txt">Go · TypeScript / Node · Python</text>
  </g>
  <g class="l d7">
    <text x="28" y="336"><tspan class="dim">~</tspan><tspan class="field" dx="8">writing</tspan></text>
    <text x="180" y="336" class="txt">distributed-systems notes at knowbase.hashnode.com</text>
  </g>

  <!-- prompt -->
  <text x="28" y="378" class="green">$</text>
  <rect class="prompt" x="44" y="364" width="9" height="18" fill="#3fb950"/>
</svg>
